<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>🤖 Agent Orchestrator</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a1f36,#0d1117);border-bottom:1px solid #30363d;padding:8px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
.hdr h1{font-size:15px;color:#58a6ff;white-space:nowrap}
.hdr .status{display:flex;gap:10px;align-items:center;font-size:11px;color:#8b949e}
.hdr .si{display:flex;align-items:center;gap:4px}
.hdr .actions{display:flex;gap:4px;align-items:center}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block}
.dot.g{background:#3fb950}.dot.r{background:#f85149}
.lay{display:grid;grid-template-columns:minmax(300px,34vw) 1fr;gap:8px;padding:8px;height:calc(100vh - 44px)}
.sb{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0}
.mn{display:flex;flex-direction:column;gap:8px;overflow:hidden;min-height:0}
.cd{background:#161b22;border:1px solid #30363d;border-radius:6px;overflow:hidden}
.ch{padding:6px 10px;border-bottom:1px solid #30363d;font-size:11px;font-weight:600;color:#8b949e;display:flex;justify-content:space-between;align-items:center}
.cb{padding:6px 10px;overflow-y:auto}
.bt{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:10px;white-space:nowrap}
.bt:hover{background:#30363d}.bt:disabled{opacity:.5;cursor:not-allowed}
.bt.g{background:#238636;border-color:#2ea043;color:#fff}.bt.g:hover{background:#2ea043}
.bt.r{background:#da3633;border-color:#f85149;color:#fff}.bt.r:hover{background:#f85149}
.bt.blue{background:#1f6feb;border-color:#388bfd;color:#fff}.bt.blue:hover{background:#388bfd}
.bt.sm{padding:1px 5px;font-size:9px}
.bs{text-align:center;padding:10px}
.bs .v{font-size:32px;font-weight:700;color:#3fb950;font-family:monospace}
.bs .l{font-size:9px;color:#8b949e;margin-top:2px}
.lf{display:flex;flex-direction:column;gap:6px}
.lf textarea{background:#0d1117;border:1px solid #30363d;color:#e1e4e8;border-radius:4px;padding:6px 8px;font-size:12px;resize:vertical;min-height:44px;font-family:inherit}
.lf textarea:focus{border-color:#58a6ff;outline:none}
.lf .rw{display:flex;gap:4px;align-items:center;flex-wrap:wrap}
.lf select,.lf input{background:#0d1117;border:1px solid #30363d;color:#e1e4e8;border-radius:4px;padding:4px 6px;font-size:10px}
.lf input{flex:1;min-width:50px}
.lbtns{display:flex;gap:4px;margin-left:auto}
.mopts{display:flex;gap:4px;flex:1;min-width:0}
.mopts>*{min-width:0}
.gb{display:flex;gap:4px}
.gc{flex:1;padding:5px;border-radius:4px;text-align:center;font-size:9px;font-weight:600}
.gc.fr{background:#0d1117;border:1px solid #30363d;color:#8b949e}
.gc.bu{background:#1c2128;border:1px solid #d29922;color:#d29922}
.qi{padding:4px 8px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;align-items:center;font-size:10px;gap:6px}
.qi .qn{flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.qi .qp{color:#8b949e;font-size:9px;max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.el{flex:1;overflow-y:auto}
.ei{padding:5px 8px;border-bottom:1px solid #1c2128;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-size:10px;gap:6px}
.ei:hover{background:#1c2128}
.ei.a{background:#1f2937;border-left:3px solid #58a6ff}
.ei .left{min-width:0;flex:1}
.ei .n{font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:4px}
.ei .m{font-size:9px;color:#8b949e;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.ei .s{font-family:monospace;font-weight:600;font-size:10px;white-space:nowrap}
.s.ok{color:#3fb950}.s.fl{color:#f85149}.s.rn{color:#d29922}
.act{display:flex;align-items:center;gap:2px;flex-shrink:0}
.badge{display:inline-block;padding:0 4px;border-radius:3px;font-size:8px;font-weight:600;line-height:16px}
.badge.ba{background:#1f6feb;color:#fff}
.badge.bs2{background:#8957e5;color:#fff}
.badge.bo{background:#d29922;color:#fff}
.badge.bsm{background:#388bfd;color:#fff}
.mt{display:flex;gap:4px;flex-wrap:wrap}
.mc{background:#161b22;border:1px solid #30363d;border-radius:6px;padding:5px 10px;text-align:center;min-width:80px}
.mc .v{font-size:16px;font-weight:700;font-family:monospace}.mc .l{font-size:8px;color:#8b949e;text-transform:uppercase;letter-spacing:.5px}
.la{flex:1;min-height:0}
.la .cb{height:calc(100% - 32px);font-family:'JetBrains Mono',monospace;font-size:11px;line-height:1.5;white-space:pre-wrap;word-break:break-all;background:#0d1117;color:#c9d1d9}
.tb{display:flex;gap:0}.t{padding:4px 10px;cursor:pointer;font-size:10px;color:#8b949e;border-bottom:2px solid transparent}
.t:hover{color:#e1e4e8}.t.a{color:#58a6ff;border-bottom-color:#58a6ff}
.fi{padding:4px 10px;border-bottom:1px solid #21262d;display:flex;justify-content:space-between;cursor:pointer;font-size:11px}
.fi:hover{background:#1c2128}.fi .sz{color:#8b949e;font-family:monospace;font-size:9px}
body.compact .hdr{padding:6px 10px}
body.compact .lay{gap:6px;padding:6px;grid-template-columns:minmax(260px,30vw) 1fr}
body.compact .ch{padding:4px 8px;font-size:10px}
body.compact .cb{padding:4px 6px}
body.compact .ei{padding:4px 6px;font-size:9px}
body.compact .ei .m{font-size:8px}
body.compact .mc{padding:4px 6px;min-width:65px}
body.compact .mc .v{font-size:13px}
body.compact .gc{padding:3px 6px}
body.compact .bs .v{font-size:26px}
body.focus-log .lay{grid-template-columns:0 1fr}
body.focus-log .sb{display:none}
body.focus-log .mn{grid-column:1/-1}
@media(max-width:1280px){.lay{grid-template-columns:minmax(260px,34vw) 1fr}}
</style></head><body>
<div class="hdr">
<h1>🤖 Orchestrator</h1>
<div class="status">
<span class="si" id="ps"><span class="dot r"></span> Proxy</span>
<span class="si" id="ws"><span class="dot r"></span> Worker</span>
<span class="si" id="afs"><span class="dot r"></span> Ideas</span>
</div>
<div class="actions">
<button class="bt" onclick="tw()" id="wb">Worker</button>
<button class="bt" onclick="tp()" id="pb">Proxy</button>
<button class="bt" onclick="showOrchestratorLog()" title="Planner log">🧠</button>
<button class="bt" onclick="showProxyLog()" title="Proxy log">📋</button>
<a href="/graph" class="bt" style="text-decoration:none" title="Graph">📊</a>
<button class="bt" onclick="tc()" title="Compact">🗜</button>
<button class="bt" onclick="tfl()" title="Focus log">↔</button>
<button class="bt" onclick="rf()">↻</button>
</div></div>
<div class="lay">
<div class="sb">
<div class="cd"><div class="cb bs"><div class="v" id="bv">—</div><div class="l" id="bl">Best Score</div></div></div>
<div class="cd"><div class="ch">🚀 Launch</div><div class="cb"><div class="lf">
<textarea id="pi" placeholder="Describe what to do — e.g. 'Try TabNet' or 'Stack exp_A and exp_B'"></textarea>
<div class="rw">
<div class="mopts">
<select id="tti" style="width:85px" onchange="onTTC()"><option value="experiment">🧪 Exp</option><option value="analysis">🔍 Analysis</option></select>
<select id="bi" style="flex:1.2"><option value="">📦 default</option></select>
<input id="ni" placeholder="Name" style="flex:0.8">
</div>
<div class="lbtns">
<button class="bt g" onclick="la()" title="Launch with explicit type/base">▶ Launch</button>
<button class="bt blue" onclick="smartLaunch()" id="slb" title="LLM auto-picks type, base, sources">🧠 Smart</button>
</div>
</div></div></div></div>
<div class="cd"><div class="ch">🎮 GPUs <span id="gpuc"></span></div><div class="cb"><div class="gb" id="gbar"></div></div></div>
<div class="cd" id="qc" style="display:none"><div class="ch">📋 Queue <span id="qnn"></span></div><div class="cb" id="ql" style="max-height:90px;padding:0"></div></div>
<div class="cd" style="flex:1;display:flex;flex-direction:column;min-height:0"><div class="ch">📊 Experiments <span id="ec"></span></div><div class="cb el" id="el" style="flex:1;padding:0"></div></div>
</div>
<div class="mn">
<div id="expHeader" style="display:none;padding:2px 0">
<div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
<span id="expName" style="font-size:14px;font-weight:600;color:#e1e4e8;font-family:monospace"></span>
<span id="expBadges" style="display:inline-flex;gap:4px"></span>
<span id="expStatus" style="font-size:11px;color:#8b949e"></span>
</div>
<div id="expPromptWrap" style="display:none;margin-top:4px">
<div id="expPromptShort" style="font-size:11px;color:#8b949e;cursor:pointer;padding:4px 8px;background:#161b22;border:1px solid #30363d;border-radius:4px" onclick="togglePrompt()"></div>
<div id="expPromptFull" style="display:none;font-size:11px;color:#c9d1d9;padding:6px 8px;background:#0d1117;border:1px solid #30363d;border-radius:4px;white-space:pre-wrap;word-break:break-word;max-height:200px;overflow:auto;margin-top:2px;cursor:pointer" onclick="togglePrompt()"></div>
</div>
</div>
<div class="mt" id="mb"></div>
<div class="cd la" style="flex:1"><div class="ch">
<div class="tb" id="ltb"><div class="t a" data-t="agent">Agent Log</div><div class="t" data-t="events">Events</div><div class="t" data-t="tasks">Tasks</div><div class="t" data-t="workspace">Workspace</div><div class="t" data-t="output">Output</div><div class="t" data-t="reports">Reports</div></div>
<button class="bt" onclick="document.getElementById('lc').scrollTop=999999">↓</button></div>
<div class="cb" id="lc">Select an experiment…</div></div>
</div></div>
<script src="/static/dashboard.js"></script>
</body></html>
