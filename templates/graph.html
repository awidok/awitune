<!DOCTYPE html>
<html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>📊 Experiment Graph</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0f1117;color:#e1e4e8;min-height:100vh}
.hdr{background:linear-gradient(135deg,#1a1f36,#0d1117);border-bottom:1px solid #30363d;padding:10px 20px;display:flex;align-items:center;justify-content:space-between}
.hdr h1{font-size:17px;color:#58a6ff}
.hdr a{color:#58a6ff;text-decoration:none;font-size:12px}
.ctl{display:flex;gap:10px;align-items:center}
.bt{background:#21262d;border:1px solid #30363d;color:#c9d1d9;padding:5px 12px;border-radius:4px;cursor:pointer;font-size:11px}
.bt:hover{background:#30363d}
.bt.a{background:#238636;border-color:#2ea043;color:#fff}
#graph{width:100%;height:calc(100vh - 48px)}
.legend{position:absolute;bottom:20px;left:20px;background:#161b22;border:1px solid #30363d;border-radius:6px;padding:10px;font-size:11px}
.legend-item{display:flex;align-items:center;gap:6px;margin:4px 0}
.legend-color{width:12px;height:12px;border-radius:2px}
.node{cursor:pointer}
.node text{font-size:10px;fill:#c9d1d9}
.node.improved text{font-weight:bold}
.link{stroke:#30363d;stroke-opacity:0.6;fill:none}
.tooltip{position:absolute;background:#161b22;border:1px solid #30363d;border-radius:4px;padding:8px;font-size:11px;pointer-events:none;opacity:0;transition:opacity 0.2s;max-width:300px;z-index:100}
.tooltip .name{font-weight:600;color:#58a6ff;margin-bottom:4px}
.tooltip .score{font-family:monospace;color:#3fb950}
.tooltip .status{color:#8b949e}
</style></head><body>
<div class="hdr">
<h1>📊 Experiment Graph</h1>
<div class="ctl">
<a href="/">← Dashboard</a>
<button class="bt" onclick="refresh()">↻ Refresh</button>
<button class="bt" id="filterImproved" onclick="toggleFilter()">★ Improved only</button>
</div>
</div>
<div id="graph"></div>
<div class="legend">
<div class="legend-item"><div class="legend-color" style="background:#ffd700"></div> Baseline</div>
<div class="legend-item"><div class="legend-color" style="background:#58a6ff"></div> DCNv2</div>
<div class="legend-item"><div class="legend-color" style="background:#a371f7"></div> Transformer</div>
<div class="legend-item"><div class="legend-color" style="background:#3fb950"></div> MLP</div>
<div class="legend-item"><div class="legend-color" style="background:#f0883e"></div> TabNet</div>
<div class="legend-item"><div class="legend-color" style="background:#db61a2"></div> Tree-based</div>
<div class="legend-item"><div class="legend-color" style="background:#8b949e"></div> Analysis</div>
<div class="legend-item"><div class="legend-color" style="background:#6e7681"></div> Other</div>
</div>
<div class="tooltip" id="tooltip"></div>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>
let data={nodes:[],edges:[],best_score:0};
let filterImproved=false;

const colors={
    baseline:'#ffd700',
    dcnv2:'#58a6ff',
    transformer:'#a371f7',
    mlp:'#3fb950',
    tabnet:'#f0883e',
    tree:'#db61a2',
    analysis:'#8b949e',
    other:'#6e7681'
};

async function load(){
    const r=await fetch('/api/graph');
    data=await r.json();
    render();
}

function toggleFilter(){
    filterImproved=!filterImproved;
    document.getElementById('filterImproved').classList.toggle('a',filterImproved);
    render();
}

function render(){
    const container=document.getElementById('graph');
    container.innerHTML='';
    
    const width=container.clientWidth;
    const height=container.clientHeight;
    
    // Filter nodes
    let nodes=data.nodes;
    let edges=data.edges;
    if(filterImproved){
        const improvedSet=new Set(nodes.filter(n=>n.improved).map(n=>n.id));
        nodes=nodes.filter(n=>n.improved);
        edges=edges.filter(e=>improvedSet.has(e.source)&&improvedSet.has(e.target));
    }
    
    // Create SVG
    const svg=d3.select('#graph').append('svg')
        .attr('width',width)
        .attr('height',height);
    
    // Create zoom behavior
    const zoom=d3.zoom()
        .scaleExtent([0.1,4])
        .on('zoom',(event)=>{
            g.attr('transform',event.transform);
        });
    
    svg.call(zoom);
    
    const g=svg.append('g');
    
    // Create force simulation
    const simulation=d3.forceSimulation(nodes)
        .force('link',d3.forceLink(edges).id(d=>d.id).distance(80))
        .force('charge',d3.forceManyBody().strength(-200))
        .force('center',d3.forceCenter(width/2,height/2))
        .force('collision',d3.forceCollide().radius(30));
    
    // Draw edges
    const link=g.append('g')
        .selectAll('line')
        .data(edges)
        .enter().append('line')
        .attr('class','link')
        .attr('stroke-width',1.5);
    
    // Draw nodes
    const node=g.append('g')
        .selectAll('g')
        .data(nodes)
        .enter().append('g')
        .attr('class',d=>'node'+(d.improved?' improved':''))
        .call(d3.drag()
            .on('start',dragstarted)
            .on('drag',dragged)
            .on('end',dragended));
    
    // Node circles
    node.append('circle')
        .attr('r',d=>{
            if(d.score&&data.best_score){
                const relScore=d.score/data.best_score;
                return 8+relScore*12;
            }
            return 10;
        })
        .attr('fill',d=>colors[d.group]||colors.other)
        .attr('stroke',d=>d.improved?'#fff':'none')
        .attr('stroke-width',d=>d.improved?2:0)
        .attr('opacity',d=>d.status==='completed'?1:0.5);
    
    // Node labels (only for improved or high score)
    node.filter(d=>d.improved||(d.score&&d.score>data.best_score*0.99))
        .append('text')
        .attr('dy',-15)
        .attr('text-anchor','middle')
        .text(d=>d.id.length>25?d.id.substring(0,22)+'...':d.id);
    
    // Tooltip
    node.on('mouseover',showTooltip)
        .on('mouseout',hideTooltip)
        .on('click',(event,d)=>{
            window.open('/?exp='+d.id,'_blank');
        });
    
    // Update positions
    simulation.on('tick',()=>{
        link
            .attr('x1',d=>d.source.x)
            .attr('y1',d=>d.source.y)
            .attr('x2',d=>d.target.x)
            .attr('y2',d=>d.target.y);
        node.attr('transform',d=>`translate(${d.x},${d.y})`);
    });
    
    function dragstarted(event,d){
        if(!event.active) simulation.alphaTarget(0.3).restart();
        d.fx=d.x;
        d.fy=d.y;
    }
    
    function dragged(event,d){
        d.fx=event.x;
        d.fy=event.y;
    }
    
    function dragended(event,d){
        if(!event.active) simulation.alphaTarget(0);
        d.fx=null;
        d.fy=null;
    }
}

function showTooltip(event,d){
    const tooltip=document.getElementById('tooltip');
    const scoreText=d.score?d.score.toFixed(6):'N/A';
    const improvedText=d.improved?' ★':'';
    tooltip.innerHTML=`
        <div class="name">${d.id}</div>
        <div class="score">Score: ${scoreText}${improvedText}</div>
        <div class="status">Status: ${d.status}</div>
        <div class="status">Group: ${d.group}</div>
    `;
    tooltip.style.left=(event.pageX+10)+'px';
    tooltip.style.top=(event.pageY-10)+'px';
    tooltip.style.opacity=1;
}

function hideTooltip(){
    document.getElementById('tooltip').style.opacity=0;
}

function refresh(){load();}
load();
window.addEventListener('resize',render);
</script></body></html>
